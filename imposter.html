        originalWords[

        ]

/* GAME STATE */

let players=[];
let currentPlayer=0;
let imposterIndex;
let chosenWord;

/* Shuffle function */

function shuffleArray(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

/* ⭐ NEW ADDITION — IMPROVED RANDOMNESS FIX */
function fixImposterBias(){
    if(players.length > 1){
        imposterIndex = Math.floor(Math.random()*players.length);
    }
}

/* GAME FUNCTIONS */

function startGame(){

let names=document.getElementById("playerNames").value;

players=names.split(",")
.map(x=>x.trim())
.filter(x=>x);

let count=parseInt(document.getElementById("playerCount").value);

if(players.length<count){
alert("Not enough players");
return;
}

players=players.slice(0,count);

/* ⭐ FIX RANDOM ERROR → Shuffle FIRST */
shuffleArray(players);

currentPlayer=0;

/* ⭐ Random imposter AFTER shuffle */
imposterIndex=getFairRandomImposter();

chosenWord=words[Math.floor(Math.random()*words.length)];

document.getElementById("setup").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");

updatePlayer();
}

function updatePlayer(){

document.getElementById("playerTitle")
.innerText=players[currentPlayer];

document.getElementById("flipCard")
.classList.remove("flipped");

document.getElementById("roleText").innerHTML="";
}

function revealRole(){

document.getElementById("flipCard")
.classList.add("flipped");

if(currentPlayer===imposterIndex){
document.getElementById("roleText").innerHTML=
"YOU ARE THE IMPOSTER 😈<br>Clue: " + chosenWord.clue;
}
else{
document.getElementById("roleText").innerHTML=
chosenWord.word;
}

}

function hideRole(){
document.getElementById("flipCard")
.classList.remove("flipped");
}

function nextPlayer(){

if(currentPlayer<players.length-1){
currentPlayer++;
updatePlayer();
}
else{
document.getElementById("game").classList.add("hidden");
document.getElementById("discussion").classList.remove("hidden");

/* ⭐ Random starter shown here (discussion screen) */
let starter=players[Math.floor(Math.random()*players.length)];
document.getElementById("starterText").innerText=
"👉 Random starter: "+starter;
}

}

function revealImposter(){

document.getElementById("discussion").classList.add("hidden");
document.getElementById("endScreen").classList.remove("hidden");

let starter=players[Math.floor(Math.random()*players.length)];

document.getElementById("endText").innerText=
"Imposter was Player "+(imposterIndex+1)+
"\nWord was: "+chosenWord.word+
"\nClue: "+chosenWord.clue+
"\n\n👉 Random starter: "+starter;
}

function restartGame(){
location.reload();
}
function getFairRandomImposter(){
    if(players.length <= 1) return 0;

    let newIndex;

    do{
        newIndex = Math.floor(Math.random()*players.length);
    }while(newIndex === 0 && players.length > 2);

    return newIndex;
}
